<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="index,follow">
  <meta name="description" content="Nightcue — a paced ear-prompter for Android. Reads any text aloud, one line at a time, into one earbud.">
  <title>Nightcue — a candle for your ear</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --surface:      #0E0B08;
      --ink:          #E8D7C2;
      --ink-muted:    #8E7B65;
      --ink-faint:    #4B4036;
      --accent:       #FFB37A;
      --accent-dim:   #7C4F2C;
      --border:       #211B14;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--surface);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
                   "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 17px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
    }
    main { max-width: 480px; }
    .ember {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: radial-gradient(
        circle at center,
        #FFE3C5 0%,
        var(--accent) 55%,
        rgba(255, 179, 122, 0) 75%
      );
      margin: 0 auto 24px;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.78; transform: scale(0.95); }
      50%      { opacity: 1;    transform: scale(1.05); }
    }
    .wordmark {
      font-family: "Iowan Old Style", "Apple Garamond", Baskerville,
                   "Times New Roman", Georgia, serif;
      font-weight: 300;
      font-style: italic;
      font-size: 2.4rem;
      letter-spacing: -0.01em;
      margin: 0 0 8px;
      color: var(--ink);
    }
    .tagline {
      font-family: "Iowan Old Style", "Apple Garamond", Baskerville,
                   "Times New Roman", Georgia, serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--ink-muted);
      margin: 0 0 40px;
    }
    .description {
      font-size: 16px;
      color: var(--ink);
      margin: 0 0 32px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 32px;
    }
    a {
      color: var(--accent);
      text-decoration: underline;
      text-decoration-color: var(--accent-dim);
      text-underline-offset: 3px;
      transition: text-decoration-color 200ms ease;
    }
    a:hover { text-decoration-color: var(--accent); }
    footer {
      margin-top: 56px;
      font-size: 13px;
      color: var(--ink-faint);
    }
  </style>
</head>
<body>
  <main>
    <div class="ember" aria-hidden="true"></div>
    <p class="wordmark">nightcue</p>
    <p class="tagline">a candle for your ear</p>

    <p class="description">
      A paced ear-prompter for Android. Reads any text aloud, one line at a
      time, into one earbud — so you can read, rehearse, or memorize without
      staring at a screen.
    </p>

    <div class="links">
      <a href="privacy.html">Privacy policy</a>
    </div>

    <footer>
      © 2026 Nightcue
    </footer>
  </main>
</body>
</html>
